- id: brain
  featured: true
  link: "/brain"
  name: "The Brain"
  type: "Company operating system"
  meta: "Selected work; company intelligence"
  one_line: "A grounded company-intelligence operating system over Slack, HubSpot, Notion, Drive, and onchain data."
  arc:
    Problem: "Commercial truth sat in six systems. Every deal or product question required manual reconciliation of lagging, conflicting sources."
    Built: "An MCP server with role-based tools, a 21-file grounded knowledge base, provenance tagging, and PII guardrails. Shipped as a Claude Code plugin, with standardized SOPs and a central index."
    "In use": "An autonomous Slack agent answers company questions on an hourly loop. Fail-closed gating; every claim carries a source; every write is audit-logged."
    Measured: "An eval suite (in CI) converts four real past failures into regression tests, run on every commit. Per-skill cost attribution."
  media: { type: slot, label: "90-second demo / architecture diagram" }
