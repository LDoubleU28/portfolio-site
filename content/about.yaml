bio:
  - "I am a data, AI, and strategy executive. I build data and AI functions from the ground up: the infrastructure, the teams, and the operating system around them. At OP Labs I stood up data engineering and user research from zero; at theSkimm I built the data function from scratch."
  - "I am customer-centric and product-minded, always thinking about who we are building for. That is why both quantitative and qualitative research matter to me: the numbers tell you what is happening, the people tell you why. It is why I stood up research alongside the data infrastructure, not after it."
  - "I have done this across banking, consumer goods, media, and crypto. I am law-trained, started in fraud and financial-crime risk, and have built and led data and AI teams from zero to one, twice, including through an IPO. I joined my current role new to crypto and was promoted within a year."
  - "I work hands-on: I architect the systems, design the agents and the evals that gate them, and lead the people and the cross-functional work. That dual fluency, building and leading, is the through-line."
  - "The assistant on this site is one of those builds. I made it on the Claude API, grounded only in this CV; ask it anything about my work."
