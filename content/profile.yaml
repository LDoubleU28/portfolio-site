track_line: "Built data and AI functions from zero twice, and worked across banking, consumer goods, media, and crypto. Previously VP, Data & Analytics and Interim CPO at theSkimm (10M+ subscribers); built analytics at Blue Apron through its NYSE IPO; advisory at EY; law-trained (LLM, University of Melbourne)."
positioning: "Data, AI, and strategy executive. I build the function from zero, stand up the operating system around the agents, and lead the people who run it."
