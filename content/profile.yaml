design_principles:
  lede: "Meet customers where they are."
  items:
    - { h: "Build on surfaces they already use", p: "Most companies now run on Slack; I treat it as the system of record and the interface, not a reason to stand up another tool." }
    - { h: "Don't make people adopt a new surface", p: "Input and output happen in Slack and the docs and sheets teams already use, instead of a separate app people have to migrate to." }
    - { h: "Close the loop in-surface", p: "Capture human feedback where the work happens, then ingest it to iterate and learn. The surface is both the interface and the data source." }
