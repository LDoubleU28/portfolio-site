hero_paragraphs:
  - "Head of Data and AI Product Leader at OP Labs, the team behind Optimism, the open-source infrastructure (the OP Stack) that powers major Layer 2 blockchains, including Coinbase's Base and Kraken's Ink: 30+ chains and $14B+ in assets. I built the data and AI function from zero across three disciplines, and ship the systems myself: agent systems on the Claude and MCP stack in daily use."
  - "I lead both the people and the agents that run these functions, and I drive company strategy, business reviews, and board reporting. I stay close to the customer: the numbers tell me what is happening, the research tells me why."
stack_line: "Building and leading data teams; the context infrastructure that puts LLMs to work; company operating systems; agents, MCP, and evals; AWS and GCP; BigQuery / Trino / Postgres / ClickHouse"
