  bullets:
    - "The video above is an early version. Since then the Brain became an operating system, not just a question-answering bot."
    - "Hardened reliability: an eval suite now gates every change (static guards on each commit, behavioral tests built from real past failures), and the autonomous agent is fail-closed and hours-gated."
    - "Spun-out agents and skills: the same grounded patterns now power per-role weekly briefs and a human-in-the-loop decision-log automation pipeline; it went from answers to a suite of agents."
